name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx vite build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/8kpro.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 8kpro-apk
          path: android/app/build/outputs/apk/debug/8kpro.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.5.0
          name: "v2.5.0 - Direct streaming fix"
          body: |
            - Fix: direct IPTV streaming without proxy (no more 15s cutoff)
            - Fix: HEVC/H.265 support via hardware decoder
            - Fix: mixed content allowed for HTTP streams
            - HLS fallback for incompatible codecs
            - Auto-reconnect watchdog
          files: android/app/build/outputs/apk/debug/8kpro.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
