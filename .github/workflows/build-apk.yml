name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx vite build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/8kpro.keystore

      - name: Build Release APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk output/8kpro.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 8kpro-apk
          path: output/8kpro.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.5.1
          name: "v3.5.1 - Red Dragon Balls + UI Polish"
          body: |
            ## 8K Pro IPTV v3.5.1

            - Red Dragon Ball theme (was orange/gold)
            - Uniform xs ball size across all pages
            - Removed yellow highlight bar on last watched channel
            - Smaller category balls with text inside
            - xs balls hide aura rings for cleaner nav bars
            - All previous v3.5.0 features included
          files: output/8kpro.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
