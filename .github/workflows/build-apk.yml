name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx vite build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/8kpro.keystore

      - name: Build Release APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk output/8kpro.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 8kpro-apk
          path: output/8kpro.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.5.0
          name: "v3.5.0 - Dragon Ball Theme"
          body: |
            ## 8K Pro IPTV v3.5.0

            - Dragon Ball aura effects on all logos, categories, navigation, dashboard, player
            - Gradient text (white→gold→orange) on channel names, titles, headings
            - Letter abbreviations replace channel icon images (no white backgrounds)
            - Loading spinner replaced with Dragon Ball sphere
            - Dashboard progressive loading + store caching for instant reload
            - ScrollToTop, SkeletonGrid, useDebounce utilities
            - Multi-language improvements
          files: output/8kpro.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
